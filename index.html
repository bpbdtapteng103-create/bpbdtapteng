<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BPBD Kabupaten Tapanuli Tengah</title>

<!-- DataTables CSS -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

<style>
body{font-family:Arial,sans-serif;margin:20px;}
h1{color:#d35400;}
</style>
</head>
<body>
<h1>BPBD Kabupaten Tapanuli Tengah</h1>
<h3>Portal Data Rumah Rusak</h3>

<table id="tabelData" class="display" style="width:100%">
  <thead>
    <tr>
      <th>NIK</th>
      <th>Nama</th>
      <th>Desa/Kelurahan</th>
      <th>Kecamatan</th>
      <th>Tingkat Kerusakan</th>
      <th>Keterangan</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<!-- jQuery & DataTables JS -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<!-- PapaParse untuk parsing CSV -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>
// Ganti dengan link CSV dari Google Sheets (Publish to Web)
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTAfzeR12tioe17bhHeiiphh55poTbX5gsteoIKQ8A7GYN2hOqORyVB05nhkmScijlzvchXBiELT_aI/pub?gid=2051195513&single=true&output=csv";

Papa.parse(csvUrl, {
  download: true,
  header: true,
  complete: function(results) {
    const data = results.data;
    const tbody = document.querySelector("#tabelData tbody");

    data.forEach(row => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${row.Nik || ""}</td>
        <td>${row.Nama || ""}</td>
        <td>${row["Desa/kelurahan"] || ""}</td>
        <td>${row.Kecamatan || ""}</td>
        <td>${row["Tingkat kerusakan"] || ""}</td>
        <td>${row.Keterangan || ""}</td>
      `;
      tbody.appendChild(tr);
    });

    // Aktifkan DataTables (pencarian + pagination otomatis)
    $('#tabelData').DataTable({
      pageLength: 25
    });
  }
});
</script>
</body>
</html>
