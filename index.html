<script>

const api = "PASTE_URL_APPS_SCRIPT_ANDA_DI_SINI";

fetch(api)
.then(r => r.json())
.then(data => {

    console.log(data);

    document.getElementById("data").innerHTML =
        "<tr><td colspan='5'>" +
        JSON.stringify(data[0], null, 2) +
        "</td></tr>";

})
.catch(err => {
    document.getElementById("data").innerHTML =
        "<tr><td colspan='5'>ERROR : " + err + "</td></tr>";
});

</script>
