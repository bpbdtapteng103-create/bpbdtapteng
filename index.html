<script>

const api = "https://script.google.com/macros/s/AKfycbxAYITzf6UtekGUZ6gtNdXMzTicQyQt0BV6GbwZOUte0gbrF1ax_kNaJcUba97rNl5Q/exec";

fetch(api)
.then(r => r.json())
.then(data => {

    console.log(data);

    document.getElementById("data").innerHTML =
        "<tr><td colspan='5'>" +
        JSON.stringify(data[0], null, 2) +
        "</td></tr>";

})
.catch(err => {
    document.getElementById("data").innerHTML =
        "<tr><td colspan='5'>ERROR : " + err + "</td></tr>";
});

</script>
