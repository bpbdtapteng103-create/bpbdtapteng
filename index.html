<script>

const api = "URL_APPS_SCRIPT_ANDA";

let semuaData = [];

function tampilkanData(data) {

  let html = "";

  data.forEach(item => {

    html += `
      <tr>
        <td>${item.NIK}</td>
        <td>${item.Nama}</td>
        <td>${item["Desa/Kelurahan"]}</td>
        <td>${item.Kecamatan}</td>
        <td>${item.Kategori}</td>
      </tr>
    `;

  });

  document.getElementById("data").innerHTML = html;
}

fetch(api)
  .then(r => r.json())
  .then(data => {

    semuaData = data;

    tampilkanData(data);

  });

document.getElementById("cari")
  .addEventListener("keyup", function() {

    const kata = this.value.toLowerCase();

    const hasil = semuaData.filter(item => {

      return (
        String(item.NIK).toLowerCase().includes(kata) ||
        String(item.Nama).toLowerCase().includes(kata)
      );

    });

    tampilkanData(hasil);

  });

</script>
